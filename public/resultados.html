<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f3f0;
      line-height: 1.9;
      color: #2c2c2c;
    }

    /* VSL Container - Single Column Flow */
    .vsl-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0;
    }

    /* Sections with Clear Visual Hierarchy */
    .section {
      background: #fdfcfb;
      margin-bottom: 3px;
      padding: 52px 40px;
    }

    .section-hero {
      background: linear-gradient(135deg, #8b9dc3 0%, #a4b5cd 100%);
      color: #fdfcfb;
      text-align: center;
      padding: 70px 40px;
    }

    .section-problem {
      background: #fef9f3;
      border-left: 5px solid #d4a574;
    }

    .section-agitation {
      background: #fef5f5;
      border-left: 5px solid #c48b8b;
    }

    .section-solution {
      background: #f3faf6;
      border-left: 5px solid #81b29a;
    }

    .section-cta {
      background: linear-gradient(135deg, #b4a5c8 0%, #9d8fb5 100%);
      color: #fdfcfb;
      text-align: center;
      padding: 70px 40px;
    }

    /* Typography - Otimizada para 50+ */
    h1 {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
      color: #2c2c2c;
    }

    h2 {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 24px;
      color: #2c2c2c;
    }

    h3 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 18px;
      color: #3a3a3a;
    }

    p {
      font-size: 19px;
      line-height: 2;
      margin-bottom: 18px;
      color: #3a3a3a;
    }

    .lead-text {
      font-size: 21px;
      font-weight: 500;
      line-height: 1.9;
      color: #2c2c2c;
    }

    .subtitle {
      font-size: 20px;
      opacity: 0.95;
      font-weight: 400;
    }

    /* Score Display */
    .score-hero {
      display: inline-block;
      background: #fdfcfb;
      color: #6b7fa8;
      font-size: 80px;
      font-weight: 700;
      padding: 28px 50px;
      border-radius: 20px;
      margin: 28px 0;
      box-shadow: 0 12px 40px rgba(139, 157, 195, 0.25);
    }

    .element-badge-large {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 600;
      margin-top: 16px;
    }

    /* Mini Scores Grid */
    .mini-scores {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 32px 0;
    }

    .mini-score-card {
      background: #fdfcfb;
      padding: 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(107, 127, 168, 0.12);
      border: 1px solid #e8e5e0;
    }

    .mini-score-value {
      font-size: 42px;
      font-weight: 700;
      color: #6b7fa8;
      display: block;
      margin-bottom: 8px;
    }

    .mini-score-label {
      font-size: 16px;
      color: #5a5a5a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* Problem/Agitation Lists */
    .symptom-list {
      list-style: none;
      margin: 28px 0;
    }

    .symptom-list li {
      padding: 16px 0;
      font-size: 19px;
      line-height: 1.9;
      border-bottom: 1px solid rgba(212, 165, 116, 0.2);
      color: #3a3a3a;
    }

    .symptom-list li:last-child {
      border-bottom: none;
    }

    .symptom-list li::before {
      content: "⚠️ ";
      margin-right: 12px;
    }

    /* Diagnosis Box */
    .diagnosis-box {
      background: linear-gradient(135deg, #fef9f3 0%, #fcf4eb 100%);
      border: 2px solid #d4a574;
      border-radius: 16px;
      padding: 40px;
      margin: 36px 0;
      box-shadow: 0 6px 20px rgba(212, 165, 116, 0.15);
    }

      font-size: 26px;
    }

    .diagnosis-box p {
      color: #4a4a4a;
      white-space: pre-line;
      font-size: 19px;
      line-height: 2;
    }

    /* CTA Button */
    .cta-button {

      color: #8b6f47;
      font-size: 22px;
      font-weight: 700;
      padding: 22px 52px;

      text-decoration: none;
      box-shadow: 0 8px 30px rgba(139, 111, 71, 0.2);
      transition: all 0.3s ease;
      margin-top: 28px;
      cursor: pointer;
      border: 2px solid #d4a574;
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(139, 111, 71, 0.3);
      background: #fff9f5;
    }

    .cta-secondary {
      background: rgba(253, 252, 251, 0.25);
      color: #fdfcfb;
      backdrop-filter: blur(10px);
      font-size: 19px;
      padding: 18px 40px;
      margin-top: 20px;
      border: 2px solid rgba(253, 252, 251, 0.4);
    }

    /* Urgency Timer */
    .urgency-box {
      background: #fef9f3;
      border: 2px dashed #d4a574;
      border-radius: 16px;
      padding: 32px;
      margin: 32px 0;
      text-align: center;
    }

    .urgency-box strong {
      color: #a85858;
      font-size: 21px;
    }

    /* Social Proof */
    .social-proof {
      background: #f8f6f3;
      border-radius: 16px;
      padding: 32px;
      margin: 36px 0;
      font-style: italic;
      border-left: 4px solid #b4a5c8;
    }

    .social-proof::before {
      content: '"';
      font-size: 56px;
      color: #8b9dc3;
      line-height: 0;
    }

    /* Charts - Simplified */
    .chart-container {
      margin: 32px 0;
      padding: 24px;
      background: #f9fafb;
      border-radius: 12px;
    }

    .chart-container canvas {
      max-width: 100%;
      height: auto !important;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 100px 20px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      border: 5px solid #e8e5e0;
      border-top: 5px solid #8b9dc3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 32px; }
      h2 { font-size: 28px; }
      h3 { font-size: 22px; }
      p { font-size: 18px; }
      .score-hero { font-size: 64px; padding: 20px 36px; }
      .section { padding: 36px 24px; }
      .section-hero, .section-cta { padding: 52px 24px; }
      .mini-scores { grid-template-columns: 1fr; }
      .cta-button { font-size: 20px; padding: 20px 44px; }
    }

    /* Highlight Box */
    .highlight-box {
      background: linear-gradient(135deg, #8b9dc3 0%, #a4b5cd 100%);
      color: #fdfcfb;
      padding: 40px;
      border-radius: 16px;
      margin: 36px 0;
      box-shadow: 0 8px 28px rgba(139, 157, 195, 0.25);
    }

    .highlight-box h3 {
      color: #fdfcfb;
      font-size: 26px;
    }

    .highlight-box p {
      color: rgba(253, 252, 251, 0.95);
      font-size: 19px;
      line-height: 2;

    /* Benefit List */
    .benefit-list {
      list-style: none;
      margin: 28px 0;
    }

    .benefit-list li {
      padding: 14px 0;
      font-size: 19px;
      line-height: 1.9;
    }

    .benefit-list li::before {
      content: "✅ ";
      margin-right: 12px;
    }

    /* Scarcity Badge */
    .scarcity-badge {
      display: inline-block;
      background: #c48b8b;
      color: #fdfcfb;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
  </style>
</head>

    // Variável global para armazenar dados do lead

    // Função para auto-signup e redirect com autenticação
    window.autoSignupRedirect = async function(targetUrl, leadData) {
      try {
        console.log('🔐 Iniciando auto-signup para:', leadData.email);

        const personaAiUrl = 'https://digital.mestreye.com';

        // Chamar endpoint de autenticação integrada
        const response = await fetch(`${personaAiUrl}/api/quiz/complete`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: leadData.email,
            fullName: leadData.nome,
            phone: leadData.celular,
            quizData: {
              elemento: leadData.elemento,
              lead_score: leadData.lead_score
            }
          })
        });

        const result = await response.json();

        if (response.ok && result.success && result.redirectUrl) {
          console.log('✅ Auto-signup concluído, redirecionando com autenticação...');
          window.location.href = `${personaAiUrl}${result.redirectUrl}`;
        } else {
          console.log('⚠️ Auto-signup falhou, redirecionando sem autenticação...');
          window.location.href = targetUrl;
        }
      } catch (error) {
        console.error('❌ Erro no auto-signup:', error);
        // Fallback: redirecionar sem autenticação
        window.location.href = targetUrl;
      }
    };

    async function carregarResultados() {
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get('email');
      const leadId = urlParams.get('id');

      if (!email && !leadId) {
        document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">❌ Nenhum email ou ID fornecido.</p>';
        return;
      }

      try {
        let url = `${API_URL}/api/lead/find?`;
        if (email) url += `email=${encodeURIComponent(email)}`;
        if (leadId) url += `leadId=${leadId}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.success) {
          document.getElementById('loading').innerHTML = `<p style="color: #dc2626;">❌ ${data.error || 'Lead não encontrado'}</p>`;
          return;
        }

        renderizarVSL(data.lead);
      } catch (error) {
        console.error('Erro:', error);
        document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">❌ Erro ao carregar resultados.</p>';
      }
    }

    function renderizarVSL(lead) {
      const primeiroNome = lead.nome.split(' ')[0];
      const elemento = lead.elemento_principal || 'RIM';
      const emoji = ELEMENTO_EMOJIS[elemento.toUpperCase()] || '🧘';
      const elementoNome = ELEMENTO_NAMES[elemento.toUpperCase()] || elemento;

      // Calcular scores
      const intensidadeScore = lead.intensidade_calculada
        ? Math.round((lead.intensidade_calculada / 5) * 100)
        : 0;
      const urgenciaScore = lead.urgencia_calculada
        ? Math.round((lead.urgencia_calculada / 5) * 100)
        : 0;

      // IMPORTANTE: Usar lead_score do backend (calculado corretamente com todas as perguntas)
      // O backend considera P1, P3, P7, P8, P11 e P12 - muito mais completo que apenas intensidade + urgência
      const leadScoreFinal = lead.lead_score || 0;
      const prontidaoScore = leadScoreFinal; // Alias para compatibilidade com código legado

      const contagemElementos = lead.contagem_elementos || {};
      const valoresElementos = Object.values(contagemElementos);
      const totalElementos = valoresElementos.length > 0 ? valoresElementos.reduce((a, b) => a + b, 0) : 0;
      const elementoMax = valoresElementos.length > 0 ? Math.max(...valoresElementos) : 0;
      const equilibrioScore = totalElementos > 0 ? Math.round((1 - (elementoMax / totalElementos)) * 100) : 50;

      const diagnostico = (lead.diagnostico_completo || lead.script_abertura || '')
        .replace(/{NOME}/g, primeiroNome);
      const isLeadQuente = leadScoreFinal >= 60;
      const isLeadMorno = leadScoreFinal >= 40 && leadScoreFinal < 60;
      const isLeadFrio = leadScoreFinal < 40;

      // Sistema de Recomendação Inteligente de Produtos
      const investimentoAtual = lead.investimento_mensal_atual || 0;
      const autonomia = lead.autonomia_decisao || 'MEDIA';

      // Banco de depoimentos reais categorizados (com imagens)

      // Função para selecionar depoimentos inteligentes
      function selecionarDepoimentos(lead, elemento) {
        const selecionados = [];
        const elementoUpper = elemento.toUpperCase();

        const temAnsiedade = (lead.P2 && lead.P2.includes('E')) || (lead.P4 && lead.P4.includes('C'));
        const temDorLombar = (lead.P2 && lead.P2.includes('A'));
        const temInsonia = (lead.P2 && lead.P2.includes('E')) || (lead.P4 && lead.P4.includes('C'));
        const temDorGeral = (lead.P2 && (lead.P2.includes('A') || lead.P2.includes('B') || lead.P2.includes('C')));
        const temZumbido = (lead.P2 && lead.P2.includes('G')) || (lead.P4 && lead.P4.includes('F'));

        // Prioridade para zumbido/labirintite
        if (temZumbido) selecionados.push(...depoimentos.zumbido.slice(0, 2));

        if (temAnsiedade) selecionados.push(...depoimentos.ansiedade.slice(0, 2));
        if (temDorLombar && selecionados.length < 4) selecionados.push(...depoimentos.dor_lombar.slice(0, 2));
        if (temInsonia && selecionados.length < 4) selecionados.push(depoimentos.insonia[0]);
        if (temDorGeral && selecionados.length < 4) selecionados.push(depoimentos.dor_geral[0]);

        if (selecionados.length < 3) {
          if (elementoUpper === 'RIM') selecionados.push(depoimentos.dor_lombar[0]);
          else if (elementoUpper === 'CORACAO' || elementoUpper === 'CORAÇÃO') selecionados.push(depoimentos.ansiedade[0]);
        }

        const universais = depoimentos.universal.filter(d => !selecionados.find(s => s.nome === d.nome));
        while (selecionados.length < 6 && universais.length > 0) selecionados.push(universais.shift());

        return selecionados.slice(0, 6);
      }

      // Catálogo de produtos por categoria

        preventiva: {
