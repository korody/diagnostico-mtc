<!DOCTYPE html>

      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      background: #f5f3f0;
      line-height: 1.9;
      color: #2c2c2c;
    }

    /* VSL Container - Single Column Flow */

      max-width: 720px;
      margin: 0 auto;
      padding: 0;
    }

    /* Sections with Clear Visual Hierarchy */
    .section {
      background: #fdfcfb;
      margin-bottom: 3px;
      padding: 52px 40px;
    }

    .section-hero {
      background: linear-gradient(135deg, #8b9dc3 0%, #a4b5cd 100%);
      color: #fdfcfb;
      text-align: center;
      padding: 70px 40px;
    }

    .section-problem {
      background: #fef9f3;
      border-left: 5px solid #d4a574;
    }

    .section-agitation {
      background: #fef5f5;
      border-left: 5px solid #c48b8b;
    }

    .section-solution {
      background: #f3faf6;
      border-left: 5px solid #81b29a;
    }

    .section-cta {
      background: linear-gradient(135deg, #b4a5c8 0%, #9d8fb5 100%);
      color: #fdfcfb;
      text-align: center;
      padding: 70px 40px;
    }

    /* Typography - Otimizada para 50+ */
    h1 {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
      color: #2c2c2c;
    }

    h2 {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 24px;
      color: #2c2c2c;
    }

    h3 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 18px;
      color: #3a3a3a;
    }

    p {
      font-size: 19px;
      line-height: 2;
      margin-bottom: 18px;
      color: #3a3a3a;
    }

    .lead-text {
      font-size: 21px;
      font-weight: 500;
      line-height: 1.9;
      color: #2c2c2c;
    }

    .subtitle {
      font-size: 20px;
      opacity: 0.95;
      font-weight: 400;
    }

    /* Score Display */
    .score-hero {
      display: inline-block;
      background: #fdfcfb;
      color: #6b7fa8;
      font-size: 80px;
      font-weight: 700;
      padding: 28px 50px;
      border-radius: 20px;
      margin: 28px 0;
      box-shadow: 0 12px 40px rgba(139, 157, 195, 0.25);

      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 600;
      margin-top: 16px;
    }

    /* Mini Scores Grid */
    .mini-scores {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 32px 0;
    }

    .mini-score-card {
      background: #fdfcfb;
      padding: 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(107, 127, 168, 0.12);
      border: 1px solid #e8e5e0;
    }

    .mini-score-value {
      font-size: 42px;
      font-weight: 700;
      color: #6b7fa8;
      display: block;
      margin-bottom: 8px;
    }

    .mini-score-label {
      font-size: 16px;
      color: #5a5a5a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* Problem/Agitation Lists */
    .symptom-list {

      line-height: 1.9;
      border-bottom: 1px solid rgba(212, 165, 116, 0.2);
      color: #3a3a3a;
    }

    .symptom-list li:last-child {

    }

    .symptom-list li::before {
      content: "⚠️ ";
      margin-right: 12px;
    }

    /* Diagnosis Box */
    .diagnosis-box {

      border: 2px solid #d4a574;
      border-radius: 16px;
      padding: 40px;

    }

    .cta-button {

      border: 2px solid #d4a574;
    }

    .cta-button:hover {
      transform: translateY(-3px);

      background: #fff9f5;
    }

    .cta-secondary {

      border-radius: 16px;
      padding: 32px;
      margin: 32px 0;
      text-align: center;
    }

    .urgency-box strong {
      color: #a85858;
      font-size: 21px;
    }

    /* Social Proof */
    .social-proof {
      background: #f8f6f3;
      border-radius: 16px;
      padding: 32px;
      margin: 36px 0;
      font-style: italic;
      border-left: 4px solid #b4a5c8;
    }

    .social-proof::before {
      content: '"';
      font-size: 56px;
      color: #8b9dc3;
      line-height: 0;
    }

    /* Charts - Simplified */
    .chart-container {
      margin: 32px 0;
      padding: 24px;
      background: #f9fafb;
      border-radius: 12px;
    }

    .chart-container canvas {
      max-width: 100%;
      height: auto !important;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 100px 20px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      border: 5px solid #e8e5e0;
      border-top: 5px solid #8b9dc3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 32px; }
      h2 { font-size: 28px; }
      h3 { font-size: 22px; }
      p { font-size: 18px; }
      .score-hero { font-size: 64px; padding: 20px 36px; }
      .section { padding: 36px 24px; }
      .section-hero, .section-cta { padding: 52px 24px; }
      .mini-scores { grid-template-columns: 1fr; }
      .cta-button { font-size: 20px; padding: 20px 44px; }

    /* Highlight Box */
    .highlight-box {

    /* Scarcity Badge */
    .scarcity-badge {
      display: inline-block;
      background: #c48b8b;
      color: #fdfcfb;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <div>Carregando seu diagnóstico personalizado...</div>
  </div>

  <div id="content" class="vsl-container" style="display: none;">

  <script>
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3001'
      : '';

    const ELEMENTO_EMOJIS = {
      'RIM': '🌊',
      'FIGADO': '🌳',
      'FÍGADO': '🌳',
      'BACO': '🌍',
      'BAÇO': '🌍',
      'CORACAO': '🔥',
      'CORAÇÃO': '🔥',
      'PULMAO': '💨',
      'PULMÃO': '💨'
    };

    const ELEMENTO_NAMES = {
      'RIM': 'Elemento ÁGUA (Rim)',
      'FIGADO': 'Elemento MADEIRA (Fígado)',
      'FÍGADO': 'Elemento MADEIRA (Fígado)',
      'BACO': 'Elemento TERRA (Baço)',
      'BAÇO': 'Elemento TERRA (Baço)',
      'CORACAO': 'Elemento FOGO (Coração)',
      'CORAÇÃO': 'Elemento FOGO (Coração)',
      'PULMAO': 'Elemento METAL (Pulmão)',
      'PULMÃO': 'Elemento METAL (Pulmão)'
    };

    // Variável global para armazenar dados do lead
    window.currentLead = null;

    // Função para auto-signup e redirect com autenticação
    window.autoSignupRedirect = async function(targetUrl, leadData) {
      try {
        console.log('🔐 Iniciando auto-signup para:', leadData.email);

        const personaAiUrl = 'https://digital.mestreye.com';

        // Chamar endpoint de autenticação integrada
        const response = await fetch(`${personaAiUrl}/api/quiz/complete`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: leadData.email,
            fullName: leadData.nome,
            phone: leadData.celular,
            quizData: {
              elemento: leadData.elemento,
              lead_score: leadData.lead_score
            }
          })
        });

        const result = await response.json();

        if (response.ok && result.success && result.redirectUrl) {
          console.log('✅ Auto-signup concluído, redirecionando com autenticação...');
          window.location.href = `${personaAiUrl}${result.redirectUrl}`;
        } else {
          console.log('⚠️ Auto-signup falhou, redirecionando sem autenticação...');
          window.location.href = targetUrl;
        }
      } catch (error) {
        console.error('❌ Erro no auto-signup:', error);
        // Fallback: redirecionar sem autenticação
        window.location.href = targetUrl;
      }
    };

    async function carregarResultados() {
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get('email');
      const leadId = urlParams.get('id');

      if (!email && !leadId) {
        document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">❌ Nenhum email ou ID fornecido.</p>';
        return;
      }

      try {
        let url = `${API_URL}/api/lead/find?`;
        if (email) url += `email=${encodeURIComponent(email)}`;
        if (leadId) url += `leadId=${leadId}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.success) {
          document.getElementById('loading').innerHTML = `<p style="color: #dc2626;">❌ ${data.error || 'Lead não encontrado'}</p>`;
          return;
        }

        renderizarVSL(data.lead);
      } catch (error) {
        console.error('Erro:', error);
        document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">❌ Erro ao carregar resultados.</p>';
      }
    }

    function renderizarVSL(lead) {
      const primeiroNome = lead.nome.split(' ')[0];
      const elemento = lead.elemento_principal || 'RIM';
      const emoji = ELEMENTO_EMOJIS[elemento.toUpperCase()] || '🧘';
      const elementoNome = ELEMENTO_NAMES[elemento.toUpperCase()] || elemento;

      // Calcular scores
      const intensidadeScore = lead.intensidade_calculada
        ? Math.round((lead.intensidade_calculada / 5) * 100)
        : 0;
      const urgenciaScore = lead.urgencia_calculada
        ? Math.round((lead.urgencia_calculada / 5) * 100)
        : 0;

      // IMPORTANTE: Usar lead_score do backend (calculado corretamente com todas as perguntas)
      // O backend considera P1, P3, P7, P8, P11 e P12 - muito mais completo que apenas intensidade + urgência
      const leadScoreFinal = lead.lead_score || 0;
      const prontidaoScore = leadScoreFinal; // Alias para compatibilidade com código legado

      const contagemElementos = lead.contagem_elementos || {};
      const valoresElementos = Object.values(contagemElementos);
      const totalElementos = valoresElementos.length > 0 ? valoresElementos.reduce((a, b) => a + b, 0) : 0;
      const elementoMax = valoresElementos.length > 0 ? Math.max(...valoresElementos) : 0;
      const equilibrioScore = totalElementos > 0 ? Math.round((1 - (elementoMax / totalElementos)) * 100) : 50;

      const diagnostico = (lead.diagnostico_completo || lead.script_abertura || '')
        .replace(/{NOME}/g, primeiroNome);
      const isLeadQuente = leadScoreFinal >= 60;
      const isLeadMorno = leadScoreFinal >= 40 && leadScoreFinal < 60;
      const isLeadFrio = leadScoreFinal < 40;

      // Sistema de Recomendação Inteligente de Produtos
      const investimentoAtual = lead.investimento_mensal_atual || 0;
      const autonomia = lead.autonomia_decisao || 'MEDIA';

      // Catálogo de produtos por categoria
      const produtos = {
        // HIGH-END: Para leads quentes com alta intensidade/urgência
        preventiva: {

          beneficios: [
            'Consultas mensais personalizadas com Mestre Ye',

            'Acompanhamento personalizado por 12 meses',
            'Receba cuidados preventivos contínuos',
            'Evite doenças antes que apareçam'
          ]
        },

        // BACK-END: Para leads com bom engajamento
        qigongCompleto: {
          nome: 'Saúde & Longevidade Qi Gong',
          preco: 1197,
          de: 1697,
          url: 'https://curso.qigongbrasil.com/pay/qig-ob',

          beneficios: [
            'Curso completo de Qi Gong com exercícios diários',

          ]
        },

        // PRODUTOS ESPECÍFICOS POR SINTOMA
        protocoloLombar: {

          beneficios: [

            'Recupere mobilidade e qualidade de vida'
          ]
        },

        protocoloZumbido: {
          nome: 'Protocolo Intensivo Zumbido/Labirintite',
          preco: 697,
          de: 997,
          url: 'https://curso.qigongbrasil.com/pay/mestre-ye-czl',
          sintomas: ['zumbido', 'tontura', 'labirintite'],
          beneficios: [

          ]
        },

        // WORKSHOPS: Aprendizado focado
        workshop5Elementos: {
          nome: '5 Elementos da Medicina Chinesa',
          preco: 297,
          de: 497,
          url: 'https://curso.qigongbrasil.com/pay/elementos-medicina-tradicional-chinesa',

        toqueCura: {

          beneficios: [

        soproCura: {

        // FRONT-END: Porta de entrada
        diagnostico: {
          nome: 'Diagnóstico MTC Completo',
          preco: 29.90,
          de: 197,

        // E-BOOKS: Entrada mais acessível
        ebookLombar: {

          preco: 29,

          ]

      };

      // Função de recomendação inteligente
      function recomendarProdutos(lead, scoreAtual) {
        const recomendacoes = [];
        const elementoUpper = elemento.toUpperCase();

        // 1. PREVENTIVA para leads qualificados (score alto + sintomas intensos)
        if (scoreAtual >= 50 && intensidadeScore >= 50) {
          recomendacoes.push({...produtos.preventiva, prioridade: 1, destaque: true});
        }

        // 2. Qi Gong Completo para leads quentes mas sem PREVENTIVA
        if (scoreAtual >= 45 && !recomendacoes.find(p => p.destaque)) {
          recomendacoes.push({...produtos.qigongCompleto, prioridade: 1, destaque: true});
        }

        // 3. Produtos específicos por ELEMENTO MTC
        if (['CORACAO', 'PULMAO'].includes(elementoUpper) && scoreAtual >= 35) {
          recomendacoes.push({...produtos.soproCura, prioridade: 2});
        }

        if (['RIM', 'BACO'].includes(elementoUpper) && scoreAtual >= 35) {
          recomendacoes.push({...produtos.protocoloLombar, prioridade: 2});
        }

        if (elementoUpper === 'FIGADO' && scoreAtual >= 35) {
          recomendacoes.push({...produtos.toqueCura, prioridade: 2});
        }

        // 4. Protocolos específicos por sintoma (se disponível nos dados do lead)
        // Exemplo: se lead tem 'zumbido', recomendar protocoloZumbido
        // Isso seria expandido com dados reais do lead

        // 5. Workshop 5 Elementos - ótimo para todos os perfis
        if (scoreAtual >= 30 && recomendacoes.length < 3) {
          recomendacoes.push({...produtos.workshop5Elementos, prioridade: 3});
        }

        // 6. Saúde Para Todos para quem busca comunidade e investimento moderado
        if (scoreAtual >= 25 && investimentoAtual < 800 && recomendacoes.length < 3) {
          recomendacoes.push({...produtos.saudeTodos, prioridade: 3});
        }

        // 7. Mestre Ye Digital sempre disponível (produto de entrada)
        if (recomendacoes.length < 2 && !recomendacoes.find(p => p.destaque)) {
          recomendacoes.push({...produtos.mestreYeDigital, prioridade: 4});
        }
        // Se já tem destaque (PREVENTIVA), preencher até 2 produtos regulares
        if (recomendacoes.length < 3 && recomendacoes.find(p => p.destaque)) {
          recomendacoes.push({...produtos.mestreYeDigital, prioridade: 4});
        }

        // 8. Toque da Cura como alternativa se ainda faltar produtos
        if (recomendacoes.length < 2 && !recomendacoes.find(p => p.destaque) && !recomendacoes.find(p => p.nome.includes('Toque'))) {
          recomendacoes.push({...produtos.toqueCura, prioridade: 3});

        const temDestaque = sorted.some(p => p.destaque);
